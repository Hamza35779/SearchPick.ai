databases:
  - name: searchpick-db
    plan: free
    region: oregon

services:
  - type: web
    name: searchpick-ai
    env: docker
    dockerfilePath: Dockerfile
    plan: free
    region: oregon
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: searchpick-db
          property: connectionString
